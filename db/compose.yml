name: fl_db

services:
  db:
    container_name: db
    image: postgres:17-alpine
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    command:
      - -c
      - log_hostname=off
    init: true
    shm_size: 128mb
    environment:
      # TZ: "Europe/Brussels"
      POSTGRES_DB: ${DB_NAME:-teneo}
      POSTGRES_USER: ${DB_USER:-teneo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teneo}
      # PGDATA: /var/lib/postgresql/data/pgdata
      # POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    networks:
      - db_net
    ports:
      - "${DB_PUBLIC_PORT:-5432}:5432"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/db/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 5s

  db_admin:
    container_name: db_admin
    image: dpage/pgadmin4
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    networks:
      - db_net
      - app_net
    ports:
      - "${DBADMIN_PUBLIC_PORT:-5433}:5050"
    environment:
      TZ: "Europe/Brussels"
      PGADMIN_DEFAULT_EMAIL: "${DBADMIN_USER:-admin@libis.be}"
      PGADMIN_DEFAULT_PASSWORD: "${DBADMIN_PWD:-admin}"
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOG_FILE: "'/var/lib/pgadmin/pgadmin4.log'"
      PGADMIN_LISTEN_ADDRESS: "0.0.0.0"
      PGADMIN_LISTEN_PORT: "5050"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/passwd:/etc/passwd:ro
      - ./data/admin/data:/var/lib/pgadmin
      - ./data/admin/logs:/var/log/pgadmin
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

