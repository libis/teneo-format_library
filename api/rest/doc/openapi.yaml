  "/formats/detail":
    get:
      summary: GET /formats/detail
      parameters:
      - name: uid
        in: query
        required: false
        schema:
          type: string
        example: unknown/uid
      responses:
        '200':
          description: returns format details
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid:
                    type: string
                  name:
                    type: string
                  version:
                    type: string
                  source:
                    type: string
                  source_version:
                    type: string
                  url:
                    type: string
                  properties:
                    type: object
                    properties: {}
                  mimetypes:
                    type: array
                    items:
                      type: string
                  extensions:
                    type: array
                    items:
                      type: string
                  created_at:
                    type: string
                required:
                - uid
                - name
                - version
                - source
                - source_version
                - url
                - properties
                - mimetypes
                - extensions
                - created_at
              example:
                uid: x-fmt/1
                name: Microsoft Word for Macintosh Document
                version: '3.0'
                source: PRONOM
                source_version: '124'
                url: https://www.nationalarchives.gov.uk/PRONOM/x-fmt/1
                properties: {}
                mimetypes:
                - application/msword
                extensions:
                - mcw
                created_at: '2026-06-09'
        '400':
          description: returns 400 without uid parameter
          content:
            text/html:
              schema:
                type: string
              example: '{"error":"Query parameter \"uid\" is required"}'
        '404':
          description: returns 404 for unknown format
          content:
            text/html:
              schema:
                type: string
              example: '{"error":"Format ''unknown/uid'' not found"}'
