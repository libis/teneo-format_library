                  properties: {}
                  mimetypes: []
                  extensions:
                  - wav
                  created_at: '2024-04-23'
                - uid: fdd000356
                  name: Broadcast WAVE Audio File Format, Version 1
                  version:
                  source: LOC
                  source_version: '2024-04-23'
                  url: https://www.loc.gov/preservation/digital/formats/fdd/fdd000356.shtml
                  properties: {}
                  mimetypes: []
                  extensions:
                  - wav
                  created_at: '2024-04-23'
                - uid: fdd000357
