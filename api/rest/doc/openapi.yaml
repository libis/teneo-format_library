---
openapi: 3.0.3
info:
  title: api
  version: 1.0.0
servers: []
paths:
  "/":
    get:
      summary: GET /
      responses:
        '200':
          description: returns API info
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  version:
                    type: string
                required:
                - message
                - version
              example:
                message: Teneo Format Library API
                version: 0.2.0
  "/formats":
    get:
      summary: GET /formats
      parameters:
      - name: extension
        in: query
        required: false
        schema:
          type: string
        example: pdf
      - name: mimetype
        in: query
        required: false
        schema:
          type: string
        example: image/jpeg
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 10
      - name: q
        in: query
        required: false
        schema:
          type: string
        example: WAVE
      - name: source
        in: query
        required: false
        schema:
          type: string
        example: PRONOM
      responses:
        '200':
          description: searches by query
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        uid:
                          type: string
                        name:
                          type: string
                        version:
                          nullable: true
                          type: string
                        source:
                          type: string
                        source_version:
                          type: string
                        url:
                          type: string
                        properties:
                          type: object
                          properties: {}
                        mimetypes:
                          type: array
                          items:
                            type: string
                        extensions:
                          type: array
                          items:
                            type: string
                        created_at:
                          type: string
                      required:
                      - uid
                      - name
                      - version
                      - source
                      - source_version
                      - url
                      - properties
                      - mimetypes
                      - extensions
                      - created_at
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total:
                        type: integer
                      total_pages:
                        type: integer
                    required:
                    - page
                    - per_page
                    - total
                    - total_pages
                required:
                - items
                - pagination
              example:
                items:
                - uid: fdd000001
                  name: WAVE Audio File Format
                  version:
                  source: LOC
                  source_version: '2024-04-23'
                  url: https://www.loc.gov/preservation/digital/formats/fdd/fdd000001.shtml
                  properties: {}
                  mimetypes:
                  - audio/wav
                  - audio/wave
                  - audio/x-pn-wav
                  - audio/x-wav
                  - audio/vnd.wave
                  extensions:
                  - wav
                  created_at: '2024-04-23'
                - uid: fdd000002
                  name: WAVE Audio File Format with LPCM audio
                  version:
                  source: LOC
                  source_version: '2024-04-23'
                  url: https://www.loc.gov/preservation/digital/formats/fdd/fdd000002.shtml
                  properties: {}
                  mimetypes: []
                  extensions: []
                  created_at: '2024-04-23'
                - uid: fdd000003
                  name: Broadcast WAVE File Format, Version 1, with LPCM Audio
                  version:
                  source: LOC
                  source_version: '2024-04-23'
