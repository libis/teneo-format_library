# inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 3.4
  Enabled: true
  Exclude:
    - 'api/grpc/format_library_pb.rb'
    - 'api/grpc/format_library_services_pb.rb'

Style/Documentation:
  Enabled: false

Style/NumericPredicate:
  Exclude:
    - 'spec/**/*'
    - '**/spec/**/*'

Style/RaiseArgs:
  Exclude:
    - 'api/grpc/*'

Lint/RescueException:
  Enabled: false

Lint/SuppressedException:
  Enabled: false

Naming/MemoizedInstanceVariableName:
  Enabled: false

Metrics/AbcSize:
  Max: 124

Metrics/BlockLength:
  Exclude:
    - '**/spec/**/*'
  Max: 208

Metrics/ClassLength:
  Max: 465

Metrics/CyclomaticComplexity:
  Max: 41

Metrics/MethodLength:
  Max: 97

Metrics/PerceivedComplexity:
  Max: 37

Layout/LineLength:
  Max: 180
